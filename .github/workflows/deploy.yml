# GitHub Pages Deploy Workflow - ACTIONS DEPLOY
# ==============================================
# Workflow automático que:
# 1. Roda toda vez que você faz push para main
# 2. Instala dependências
# 3. Roda build do Vite
# 4. Faz deploy direto via GitHub Actions
#
# Configuração:
# - Settings > Pages > Build and deployment
# - Source: GitHub Actions
# - (não selecione branch)

name: Deploy to GitHub Pages (Actions)

# Triggers: Quando executar?
on:
  # Quando há push para main (seus commits)
  push:
    branches:
      - main  # ⚠️ MUDE PARA SUA BRANCH PRINCIPAL SE FOR DIFERENTE

  # Permite disparo manual pelo GitHub Actions UI
  workflow_dispatch:

# Variáveis globais
env:
  NODE_VERSION: '18'  # Versão do Node.js a usar

# Permissões necessárias para Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Instalar dependências
        run: npm install

      - name: Build com Vite
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Job: Deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4